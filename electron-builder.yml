################################################################################
# Helios Desktop Application - electron-builder Configuration
#
# This file configures cross-platform packaging for:
# - Windows (NSIS assisted installer)        -> x64 (Windows 10 + 11)
# - macOS (DMG + PKG installers)             -> SEPARATE Intel + Apple Silicon
# - Linux (AppImage + DEB packages)
################################################################################

appId: com.navyug.helios
productName: Helios
copyright: Copyright © 2024-2026 Navyug Designs

directories:
  buildResources: build
  output: dist

files:
- out/**
- package.json

extraResources:
- from: resources/backend/${os}
  to: backend
- from: resources/Helios_splash.png
  to: Helios_splash.png
- from: build/icons/512x512.png
  to: icon.png

################################################################################
# WINDOWS - x64 only (Windows 10 + 11 dono par chalta hai)
################################################################################
win:
  target:
  - nsis
  icon: build/icon.ico
  signAndEditExecutable: false
  publisherName: "Navyug Designs"

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Helios
  uninstallDisplayName: Helios
  oneClick: false
  license: build/license.txt
  allowToChangeInstallationDirectory: true
  perMachine: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

################################################################################
# macOS - SEPARATE Intel + Apple Silicon files
#
# File names workflow ke rename step se aate hain - jaise ubuntu wala:
#   helios-1.0.0-setup-mac-intel.dmg     (x64 build -> rename to mac-intel)
#   helios-1.0.0-setup-mac-intel.pkg
#   helios-1.0.0-setup-mac-silicon.dmg   (arm64 build -> rename to mac-silicon)
#   helios-1.0.0-setup-mac-silicon.pkg
#
# Yahan artifactName mein ${arch} HATA diya hai - kyunki workflow rename
# step intel/silicon naam laga dega (jaise ubuntu version laga deta hai).
################################################################################
mac:
  identity: null
  sign: null
  notarize: false
  icon: build/icon.icns
  minimumSystemVersion: "12.0"
  target:
  - dmg
  - pkg

dmg:
  artifactName: ${name}-${version}-setup.${ext}

pkg:
  artifactName: ${name}-${version}-setup.${ext}
  license: build/license.txt
  installLocation: /Applications
  allowAnywhere: true
  allowCurrentUserHome: false
  isRelocatable: false
  isVersionChecked: true
  welcome: build/welcome.txt
  conclusion: build/conclusion.txt

################################################################################
# LINUX - AppImage + DEB Packages
################################################################################
linux:
  target:
  - AppImage
  - deb
  maintainer: Navyug Designs
  category: Utility
  executableName: helios
  artifactName: ${name}-${version}-setup.${ext}
  icon: build/icons

afterPack: build/afterPack.js

npmRebuild: false

publish:
  provider: generic
  url: https://updates.example.com/auto-updates
