################################################################################
# Helios Desktop Application - electron-builder Configuration
#
# This file configures cross-platform packaging for:
# - Windows (NSIS assisted installer)
# - macOS (DMG + PKG installers)
# - Linux (AppImage + DEB packages)
#
# Build outputs are created in dist/
# Do not use absolute paths for build resources - all paths are relative to repo root
#
# For CI/CD: This configuration is platform-agnostic and works in any environment
################################################################################

appId: com.navyug.helios
productName: Helios
copyright: Copyright © 2024-2026 Navyug Designs

# Build directories (relative paths only)
directories:
  buildResources: build       # Installer assets: icons, license, etc.
  output: dist                # Final installers go here

# Files to include in packaged app
# Excludes: node_modules is handled by default, src/ code is compiled to out/
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.js,.prettierignore,.prettierrc,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!internals/*'

# Extra resources to bundle (repo-local paths only - NO absolute paths)
# Backend executables: bundled at resources/backend/
# electron-builder ${os} variable maps to: mac, win, linux
# Files copied from resources/backend/${os}/ are placed in packaged app resources/backend/
extraResources:
  - from: resources/backend/${os}
    to: backend

################################################################################
# WINDOWS - NSIS Assisted Installer
################################################################################
# Produces: helios-1.0.0-setup.exe
# UX flow: Welcome → License → Directory → Progress → Complete Launch
# Professional enterprise-grade installer with UAC elevation support
#
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Helios
  uninstallDisplayName: Helios
  
  # Installer mode: assisted (NOT one-click)
  # Enables all customization options
  oneClick: false
  
  # License agreement - user MUST accept before proceeding
  license: build/license.txt
  
  # Allow users to select custom install directory
  allowToChangeInstallationDirectory: true
  
  # System-wide installation (all users) - requires admin elevation
  perMachine: true
  allowElevation: true
  
  # Post-install actions
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  
  # Branding assets (must exist in build/ folder)
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  
  # Optional: custom NSIS script for advanced customization
  # Only include if the file exists and contains stable code
  include: build/installer.nsh

################################################################################
# macOS - Professional App Bundle + Installers
################################################################################
# Targets:
# - DMG: Simple drag-and-drop installer (Helios.dmg)
# - PKG: Professional installer with license (Helios.pkg)
# App bundle: /Applications/Helios.app
#
mac:
  # Code signing: Set to valid identity for production
  # For development, leave as null (no code signing)
  identity: null
  sign: null
  
  # Notarization: Required for distribution via App Store or web
  # For development, leave as false
  notarize: false
  
  # Installer targets
  target:
    - dmg   # Drag-and-drop disk image
    - pkg   # Professional multi-screen installer

dmg:
  artifactName: ${name}-${version}.${ext}

pkg:
  artifactName: ${name}-${version}.${ext}
  # License shown in installer
  license: build/license.txt
  # Installation path for unsigned app
  installLocation: /Applications
  allowAnywhere: true
  allowCurrentUserHome: false
  isRelocatable: false
  isVersionChecked: true
  # Installer screen text
  welcome: build/welcome.txt
  conclusion: build/conclusion.txt

################################################################################
# LINUX - AppImage + DEB Packages
################################################################################
# AppImage: Universal Linux executable (no dependencies required)
# DEB: Standard Debian/Ubuntu package
#
linux:
  target:
    - AppImage
    - deb
  # Maintainer contact for DEB package
  maintainer: support@example.com
  # Linux desktop classification
  category: Utility
  # Optional: desktop icon name (if .desktop file references it)
  # icon: resources/icon

appImage:
  artifactName: ${name}-${version}.${ext}

deb:
  artifactName: ${name}-${version}.${ext}

################################################################################
# General Build Settings
################################################################################

# Do not auto-rebuild native modules in packaged app
npmRebuild: false

# Publish configuration (for auto-updates)
# Update with actual URL for production distribution
publish:
  provider: generic
  url: https://updates.example.com/auto-updates
