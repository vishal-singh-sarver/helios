################################################################################
# Helios Desktop Application - electron-builder Configuration
#
# This file configures cross-platform packaging for:
# - Windows (NSIS assisted installer)        -> x64 (Windows 10 + 11)
# - macOS (DMG + PKG installers)             -> SEPARATE Intel (x64) + Apple Silicon (arm64)
# - Linux (AppImage + DEB packages)
################################################################################

appId: com.navyug.helios
productName: Helios
copyright: Copyright © 2024-2026 Navyug Designs

directories:
  buildResources: build
  output: dist

files:
- out/**
- package.json

extraResources:
- from: resources/backend/${os}
  to: backend
- from: resources/Helios_splash.png
  to: Helios_splash.png
- from: build/icons/512x512.png
  to: icon.png

################################################################################
# WINDOWS - x64 only (Windows 10 + 11 dono par chalta hai)
################################################################################
win:
  target:
  - nsis
  icon: build/icon.ico
  signAndEditExecutable: false

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Helios
  uninstallDisplayName: Helios
  oneClick: false
  license: build/license.txt
  allowToChangeInstallationDirectory: true
  perMachine: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

################################################################################
# macOS - SEPARATE Intel (x64) + Apple Silicon (arm64) files
#
# Changes:
#  1. minimumSystemVersion: "12.0"  -> macOS 12 (Monterey) se 26 (Tahoe) tak chalega
#  2. har target ke andar arch [x64, arm64] -> dono chips ki ALAG files
#  3. artifactName mein ${arch} -> files aapas mein overwrite na ho
#
# Banegi (4 alag files):
#   helios-1.0.0-x64-setup.dmg     (Intel Mac)
#   helios-1.0.0-arm64-setup.dmg   (Apple Silicon - M1/M2/M3/M4)
#   helios-1.0.0-x64-setup.pkg
#   helios-1.0.0-arm64-setup.pkg
################################################################################
mac:
  identity: null
  sign: null
  notarize: false
  icon: build/icon.icns
  minimumSystemVersion: "12.0"
  target:
  - target: dmg
    arch:
    - x64
    - arm64
  - target: pkg
    arch:
    - x64
    - arm64

dmg:
  artifactName: ${name}-${version}-${arch}-setup.${ext}

pkg:
  artifactName: ${name}-${version}-${arch}-setup.${ext}
  license: build/license.txt
  installLocation: /Applications
  allowAnywhere: true
  allowCurrentUserHome: false
  isRelocatable: false
  isVersionChecked: true
  welcome: build/welcome.txt
  conclusion: build/conclusion.txt

################################################################################
# LINUX - AppImage + DEB Packages
################################################################################
linux:
  target:
  - AppImage
  - deb
  maintainer: Navyug Designs
  category: Utility
  executableName: helios
  artifactName: ${name}-${version}-setup.${ext}
  icon: build/icons

afterPack: build/afterPack.js

npmRebuild: false

publish:
  provider: generic
  url: https://updates.example.com/auto-updates
