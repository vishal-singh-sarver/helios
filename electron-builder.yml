appId: com.navyug.helios
productName: Helios
copyright: Copyright © 2024 Navyug Designs

directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.js,.prettierignore,.prettierrc,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!internals/*'

extraFiles:
  - from: /Users/navyug/PyHelios/Helios-UI/heliosgui-desktop/src-tauri/resources/heliosgui_backend
    to: resources/heliosgui_backend

# NSIS Windows Installer Configuration
# Implements professional multi-step installer with license agreement + directory selection
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Helios
  uninstallDisplayName: Helios
  
  # === Installer Type: Assisted (NOT one-click) ===
  # Enables multi-step UI flow: Welcome → License → Directory → Install → Complete
  oneClick: false
  
  # === License Agreement ===
  # User MUST accept license before proceeding to installation
  license: build/license.txt
  
  # === Installation Directory Selection ===
  # Allows users to choose custom install location
  allowToChangeInstallationDirectory: true
  
  # === Permissions & System Integration ===
  # Installs per-machine (all users) - requires admin elevation
  perMachine: true
  allowElevation: true
  
  # === Shortcuts & Launch ===
  createDesktopShortcut: true
  createStartMenuShortcut: true
  
  # === Post-Install Action ===
  # Automatically launch app after successful installation
  runAfterFinish: true
  
  # === Installer Customization ===
  # Icon files for branding consistency
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  
  # === NSIS Script Customization ===
  # Custom installer pages and behavior
  include: build/installer.nsh

mac:
  # Development: Skip code signing
  identity: null
  sign: null
  notarize: false
  
  # PKG installer targets (with license agreement support)
  target:
    - dmg
    - pkg

dmg:
  artifactName: ${name}-${version}.${ext}

pkg:
  # PKG installer configuration with license agreement
  artifactName: ${name}-${version}.${ext}
  # License file shown in installer
  license: build/license.txt
  # Installation location - changed to user Applications for unsigned builds
  installLocation: /Applications
  # Allow installation anywhere
  allowAnywhere: true
  allowCurrentUserHome: true
  # Welcome, conclusion, and other screens
  welcome: build/welcome.txt
  conclusion: build/conclusion.txt

linux:
  target:
    - AppImage
    - deb
  maintainer: yourname@email.com
  category: Utility

appImage:
  artifactName: ${name}-${version}.${ext}

npmRebuild: false

publish:
  provider: generic
  url: https://example.com/auto-updates
