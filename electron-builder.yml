################################################################################
# Helios Desktop Application - electron-builder Configuration
################################################################################

appId: com.navyug.helios
productName: Helios
copyright: Copyright © 2024-2026 Navyug Designs

directories:
  buildResources: build
  output: dist

files:
- out/**
- package.json

extraResources:
- from: resources/backend/${os}
  to: backend
- from: resources/Helios_splash.png
  to: Helios_splash.png
- from: build/icons/512x512.png
  to: icon.png

################################################################################
# WINDOWS - NSIS Assisted Installer
################################################################################
win:
  target:
  - nsis
  icon: build/icon.ico
  # FIX: publisherName must match the CN field in your .pfx certificate exactly.
  # electron-builder cannot auto-extract it — causes "Cannot extract publisher name" error.
  # Run this locally to find your cert's CN:
  #   certutil -dump yourCert.pfx   (Windows)
  # Then paste the exact CN value below, e.g. "Navyug Designs" or "Navyug Designs Pvt Ltd"
  publisherName: "Navyug Designs"
  # signAndEditExecutable must be true for signing to work in CI
  signAndEditExecutable: true

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Helios
  uninstallDisplayName: Helios
  oneClick: false
  license: build/license.txt
  allowToChangeInstallationDirectory: true
  perMachine: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

################################################################################
# macOS - DMG + PKG
################################################################################
mac:
  identity: null
  sign: null
  notarize: false
  icon: build/icon.icns
  target:
  - dmg
  - pkg

dmg:
  artifactName: ${name}-${version}.${ext}

pkg:
  artifactName: ${name}-${version}.${ext}
  license: build/license.txt
  installLocation: /Applications
  allowAnywhere: true
  allowCurrentUserHome: false
  isRelocatable: false
  isVersionChecked: true
  welcome: build/welcome.txt
  conclusion: build/conclusion.txt

################################################################################
# LINUX - AppImage + DEB
################################################################################
linux:
  target:
  - AppImage
  - deb
  maintainer: Navyug Designs
  category: Utility
  executableName: helios
  artifactName: ${name}-${version}.${ext}
  icon: build/icons

################################################################################
# Build Hooks & General Settings
################################################################################
afterPack: build/afterPack.js

npmRebuild: false

publish:
  provider: generic
  url: https://updates.example.com/auto-updates
