name: Emergency / single platform

on:
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        description: 'Target platform patch'
        options:
          - win
          - mac
          - linux
        required: true
      channel:
        type: choice
        description: 'Target feed channel environment'
        options:
          - beta
          - stable
        required: true
      version:
        description: 'Strict format target build tag (e.g. v1.2.3)'
        required: true
      justification:
        description: 'Mandatory Written audit statement'
        required: true

jobs:
  emergency-republish:
    runs-on: ubuntu-latest
    steps:
      - name: Log Justification Audit
        run: |
          echo "EMERGENCY ACTION EXECUTION LOG"
          echo "Operator: ${{ github.actor }}"
          echo "Target Version: ${{ github.event.inputs.version }}"
          echo "Target Platform: ${{ github.event.inputs.platform }}"
          echo "Channel Destination: ${{ github.event.inputs.channel }}"
          echo "Reasoning Statement: ${{ github.event.inputs.justification }}"

      - name: Configure Cloud Storage Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.UPDATE_FEED_S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.UPDATE_FEED_S3_SECRET_KEY }}
          aws-region: us-east-1

      # Logic resolves hotfix sync for targeted parameters cleanly
      - name: Execute Selective Synchronization Hotfix
        run: |
          TARGET_BUCKET="UPDATE_FEED_BUCKET_${{ matrix.channel == 'beta' && 'BETA' || 'STABLE' }}"
          echo "Syncing specific system assets..."
          # Customize AWS command targets manually for exact file patch if required