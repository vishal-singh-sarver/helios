name: CI / develop

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env
      - run: npm run lint
      - run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env
      - run: npm run test:unit

  build-verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libnss3 libxss1 libasound2 libxtst6 libxrandr2 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libgbm1 libxkbcommon0 fonts-liberation xdg-utils libglu1-mesa-dev freeglut3-dev mesa-common-dev

      - run: npm ci
      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env
      - run: npm run build