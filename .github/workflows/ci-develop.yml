name: CI / develop

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Typecheck
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # ❌ cache: npm ko yahan se hata diya hai

      # Agar dependencies install karne mein dikkat aaye toh 'npm ci' ki jagah 'npm install' use kar sakte hain agar lockfile nahi hai
      - run: npm install

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - name: Run unit tests
        run: npm run test:unit

  build:
    name: Build Check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Create .env file
        shell: bash
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - name: Build (compile check only — no packaging, no signing)
        run: npm run build