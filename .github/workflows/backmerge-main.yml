# ============================================================================
# Back-merge main
#
# Doc reference: section 5.6
#
# Kab chalega: jab bhi main par push hota hai (PR merge ya direct push,
# hotfix ke baad). Main par jo changes aaye hain, unhe release aur develop
# tak vaapas merge karna zaroori hai, varna branches drift karenge.
#
# Order MATTERS: pehle main -> release, fir main -> develop.
# Agar develop pehle merge kiya, to main ke changes develop mein 2 baar
# aa jaayenge (ek seedhe, ek release ke through).
#
# Workflow conflicts handle karta hai - PR open ho jaayegi conflict state
# mein, human use solve karega.
# ============================================================================
name: Back-merge main

on:
  push:
    branches: [main]

permissions:
  contents: write       # branches push karne ke liye
  pull-requests: write  # PR banane ke liye

jobs:
  # --------------------------------------------------------------------------
  # 1. BACKMERGE-RELEASE - main -> release
  # Pehle release ko catch up karte hain
  # --------------------------------------------------------------------------
  backmerge-release:
    name: Back-merge main -> release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # poora history chahiye merge ke liye

      - name: Skip if main = release already
        id: check-diff
        run: |
          set -e
          git fetch origin release main
          if git merge-base --is-ancestor origin/main origin/release; then
            echo "main already merged in release. Skip kar rahe hain."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "main par naye commits hain jo release mein nahi. PR banayenge."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR main -> release
        if: steps.check-diff.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Pehle check karo, koi existing PR to nahi hai
          EXISTING=$(gh pr list \
            --base release --head main \
            --state open \
            --json number --jq '.[0].number' || true)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already open from main -> release. Skip."
            exit 0
          fi

          # Naya PR banao
          gh pr create \
            --base release \
            --head main \
            --title "Back-merge main -> release (auto)" \
            --body "$(cat <<EOF
          Auto-generated after push to main.

          - **Trigger commit:** \`${GITHUB_SHA:0:7}\`
          - **Pushed by:** @${{ github.actor }}

          Review aur merge ASAP karo taaki release branch main ke saath
          sync mein rahe. Agar conflicts hain, manually resolve karke
          merge karo.
          EOF
          )"

  # --------------------------------------------------------------------------
  # 2. BACKMERGE-DEVELOP - main -> develop
  # backmerge-release ke baad chalega (needs:)
  # NOTE: backmerge-release ko complete hone do (PR open ho gayi) - merge
  # hone ka wait nahi karte. Develop wala PR independently parallel chalega.
  # --------------------------------------------------------------------------
  backmerge-develop:
    name: Back-merge main -> develop
    runs-on: ubuntu-latest
    needs: backmerge-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if main = develop already
        id: check-diff
        run: |
          set -e
          git fetch origin develop main
          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "main already in develop. Skip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "main par naye commits hain. PR banayenge."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR main -> develop
        if: steps.check-diff.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          EXISTING=$(gh pr list \
            --base develop --head main \
            --state open \
            --json number --jq '.[0].number' || true)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already open from main -> develop. Skip."
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "Back-merge main -> develop (auto)" \
            --body "$(cat <<EOF
          Auto-generated after push to main.

          - **Trigger commit:** \`${GITHUB_SHA:0:7}\`
          - **Pushed by:** @${{ github.actor }}

          Ye PR release wali backmerge ke baad merge karo (varna conflict
          aa sakte hain). Develop ko bhi main ke latest changes mil jaayenge.
          EOF
          )"