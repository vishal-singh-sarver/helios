name: CI / release

on:
  pull_request:
    branches: [release]
  push:
    branches: [release]

jobs:
  # Unit tests, Lint & Typecheck running in parallel
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

  test-integration:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env
      - run: npm run test:integration

  package:
    needs: [validate, test-integration]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libnss3 libxss1 libasound2 libxtst6 libxrandr2 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libgbm1 libxkbcommon0 fonts-liberation xdg-utils libglu1-mesa-dev freeglut3-dev mesa-common-dev

      - run: npm ci
      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      # --- CODE SIGNING & NOTARIZATION CONFIGURATION ---
      # Windows Signing Setup
      - name: Setup Windows Certificate
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.WIN_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $certBytes)
        env:
          CSC_LINK: ${{ github.workspace }}\cert.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}

      # macOS Signing & Keychain Setup
      - name: Setup macOS Keychain and Certs
        if: matrix.os == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_CERT_BASE64 }}" | base64 --decode > certificate.p12
          security create-keychain -p "temporary-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temporary-password" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.APPLE_CERT_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temporary-password" build.keychain

      # --- BUILD PACKAGES ---
      - name: Build and Package Signed App
        run: npm run package
        env:
          # Electron builder automatic picking variables
          CSC_LINK: ${{ github.workspace }}/cert.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Notarization Verification / Stapling for macOS
      - name: Staple macOS Build
        if: matrix.os == 'macos-latest'
        run: |
          # Staple targets generated inside dist folder
          xcrun stapler staple dist/*.dmg || echo "Stapling skipped or handled by builder"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/
          retention-days: 30