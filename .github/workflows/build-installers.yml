################################################################################
# Helios - Cross-Platform Installer Build Workflow
#
# This workflow builds installers for Windows, macOS, and Linux whenever:
# 1. Code is pushed to main/release branches
# 2. Release tags are created (v*.*.*)
# 3. Manually triggered from Actions tab
#
# Outputs: Signed installers ready for distribution
################################################################################

name: Build Installers

on:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ============================================================================
  # WINDOWS: Build NSIS assisted installer
  # ============================================================================
  build-windows:
    runs-on: windows-latest
    name: Build Windows Installer
    
    steps:
      - name: ✓ Checkout repository
        uses: actions/checkout@v4
      
      - name: ✓ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: ✓ Install dependencies
        run: npm ci
      
      - name: ✓ Build application
        run: npm run build
      
      - name: ✓ Package for Windows
        run: npm run package:win
        env:
          # Optional: Add code signing here for production
          # CERTIFICATE_FILE: ${{ secrets.WIN_CERTIFICATE_FILE }}
          # CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
      
      - name: ✓ Verify installer created
        shell: pwsh
        run: |
          $installer = Get-Item dist/*.exe
          Write-Host "Installer created: $($installer.Name)"
          Write-Host "Size: $([Math]::Round($installer.Length / 1MB, 2)) MB"
      
      - name: ✓ Upload Windows installer
        uses: actions/upload-artifact@v3
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 30

  # ============================================================================
  # macOS: Build DMG + PKG installers
  # ============================================================================
  build-macos:
    runs-on: macos-latest
    name: Build macOS Installers
    
    steps:
      - name: ✓ Checkout repository
        uses: actions/checkout@v4
      
      - name: ✓ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: ✓ Install dependencies
        run: npm ci
      
      - name: ✓ Build application
        run: npm run build
      
      - name: ✓ Package for macOS
        run: npm run package:mac
        env:
          # For production code signing, uncomment and add secrets:
          # APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          # APPLE_CERTIFICATE_FILE: ${{ secrets.APPLE_CERTIFICATE_FILE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      
      - name: ✓ Verify installers created
        run: |
          ls -lh dist/*.{dmg,pkg}
          du -sh dist/mac-arm64/Helios.app
      
      - name: ✓ Upload macOS installers
        uses: actions/upload-artifact@v3
        with:
          name: macos-installers
          path: dist/*.{dmg,pkg}
          retention-days: 30

  # ============================================================================
  # LINUX: Build AppImage + DEB package
  # ============================================================================
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux Packages
    
    steps:
      - name: ✓ Checkout repository
        uses: actions/checkout@v4
      
      - name: ✓ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: ✓ Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgconf-2-4 \
            libxss1 \
            libasound2 \
            libappindicator1 \
            libindicator7 \
            gconf-service \
            fonts-liberation \
            xdg-utils
      
      - name: ✓ Install npm dependencies
        run: npm ci
      
      - name: ✓ Build application
        run: npm run build
      
      - name: ✓ Package for Linux
        run: npm run package:linux
      
      - name: ✓ Verify packages created
        run: |
          ls -lh dist/*.{AppImage,deb}
          file dist/Helios-*.AppImage
      
      - name: ✓ Upload Linux packages
        uses: actions/upload-artifact@v3
        with:
          name: linux-packages
          path: dist/*.{AppImage,deb}
          retention-days: 30

  # ============================================================================
  # RELEASE: Create GitHub Release with all installers
  # ============================================================================
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    # Only create release for version tags
    
    steps:
      - name: ✓ Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-artifacts
      
      - name: ✓ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: false
          body: |
            # Helios Desktop Application Release
            
            Platform-specific installers:
            - **Windows**: `helios-*.exe` - NSIS assisted installer (Admin elevation required)
            - **macOS**: `helios-*.dmg` - Drag-and-drop installer
            - **macOS Pro**: `helios-*.pkg` - Professional installer with license agreement
            - **Linux**: `Helios-*.AppImage` - Universal Linux executable
            - **Linux**: `helios-*.deb` - Debian/Ubuntu package
            
            See [PACKAGING_DEPLOYMENT.md](PACKAGING_DEPLOYMENT.md) for installation instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

################################################################################
# NOTES:
#
# 1. Triggers:
#    - Automatic: Pushes to main/release branches
#    - Automatic: Version tags (v1.0.0, etc.)
#    - Manual: Via "Run workflow" in GitHub Actions UI
#
# 2. Requirements:
#    - Latest Node.js installed on the build VM runtime
#    - Platform-specific build tools auto-installed
#
# 3. Code Signing (Production):
#    - Windows: Create GitHub secret WIN_CERTIFICATE_FILE with .pfx base64
#    - macOS: Create secrets APPLE_DEVELOPER_TEAM_ID, APPLE_CERTIFICATE_FILE, etc.
#    - See GitHub Secrets documentation for setup
#
# 4. Build Artifacts:
#    - Downloadable from Actions tab for 30 days
#    - Automatically attached to releases if tag-triggered
#
# 5. Estimated Build Times:
#    - Windows: 8-10 minutes
#    - macOS: 10-12 minutes
#    - Linux: 8-10 minutes
#    - Total: ~30-35 minutes for all platforms
#
################################################################################
