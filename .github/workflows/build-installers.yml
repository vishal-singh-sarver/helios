name: Build Installers

on:
  push:
    tags:
      - 'v*'
      - 'qa-*'
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-2019
    name: Build Windows Installer
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - name: Build application
        run: npm run build

      - name: Package Windows Installer
        run: npm run package:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe


  build-macos:
    runs-on: macos-latest
    name: Build macOS Installer
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - name: Build application
        run: npm run build

      - name: Package macOS Installer
        run: npm run package:mac

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
            dist/*.pkg


  build-linux:
    runs-on: ubuntu-20.04
    name: Build Linux Packages
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            libxrandr2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libgbm1 \
            libxkbcommon0 \
            fonts-liberation \
            xdg-utils \
            libglu1-mesa-dev \
            freeglut3-dev \
            mesa-common-dev

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - name: Build application
        run: npm run build

      - name: Package Linux Installer
        run: npm run package:linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb


  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes Table
        shell: bash
        run: |
          echo "## Helios ${GITHUB_REF_NAME} Assets" > notes.md
          echo "" >> notes.md
          echo "| OS | File | Size | Checksum (sha256) |" >> notes.md
          echo "|----|------|------|-------------------|" >> notes.md

          TAG=${GITHUB_REF#refs/tags/}
          REPO="${{ github.repository }}"

          find artifacts -type f | while read file; do
            name=$(basename "$file")
            size=$(du -h "$file" | cut -f1)
            checksum=$(sha256sum "$file" | cut -d ' ' -f1)
            url="https://github.com/$REPO/releases/download/$TAG/$name"
            os="Unknown"
            [[ $name == *.exe ]] && os="Windows"
            [[ $name == *.dmg ]] && os="macOS"
            [[ $name == *.pkg ]] && os="macOS"
            [[ $name == *.AppImage ]] && os="Linux"
            [[ $name == *.deb ]] && os="Linux"
            echo "| $os | [$name]($url) | $size | \`$checksum\` |" >> notes.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          body_path: notes.md
          draft: false
          prerelease: false