name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    name: Build Windows Installer
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - run: npm run build
      - run: npm run package:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe


  build-macos:
    runs-on: macos-latest
    name: Build macOS Installer
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install   # ✅

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - run: npm run build
      - run: npm run package:mac

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
            dist/*.pkg

  build-linux:
    runs-on: ubuntu-22.04
    name: Build Linux Packages
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            libxrandr2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libgbm1 \
            libxkbcommon0 \
            fonts-liberation \
            xdg-utils \
            libglu1-mesa-dev \
            freeglut3-dev \
            mesa-common-dev

      - run: npm install   # ✅

      - name: Create .env file
        run: echo "VITE_BACKEND_URL=http://localhost:8000" > .env

      - run: npm run build
      - run: npm run package:linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb


  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ✅ FIX: ensure notes file always created cleanly
      - name: Generate Release Notes Table
        run: |
          echo "## Helios ${GITHUB_REF_NAME} Assets" > notes.md
          echo "" >> notes.md
          echo "| OS | File | Size | Checksum (sha256) |" >> notes.md
          echo "|----|------|------|-------------------|" >> notes.md

          TAG=${GITHUB_REF#refs/tags/}
          REPO="${{ github.repository }}"

          for file in $(find artifacts -type f); do
            name=$(basename "$file")
            size=$(du -h "$file" | cut -f1)
            checksum=$(sha256sum "$file" | cut -d ' ' -f1)
            url="https://github.com/$REPO/releases/download/$TAG/$name"

            os="Unknown"

            if [[ $name == *.exe ]]; then os="Windows"; fi
            if [[ $name == *.dmg ]]; then os="macOS"; fi
            if [[ $name == *.pkg ]]; then os="macOS"; fi
            if [[ $name == *.AppImage ]]; then os="Linux"; fi
            if [[ $name == *.deb ]]; then os="Linux"; fi

            echo "| $os | [$name]($url) | $size | \`$checksum\` |" >> notes.md
          done

      # ✅ FIX: explicitly pass tag_name
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          body_path: notes.md
          generate_release_notes: true
          draft: false
          prerelease: false